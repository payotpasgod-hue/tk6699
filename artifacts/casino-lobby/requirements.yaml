packages:
  "zustand": "Global state management for the casino lobby"
  "framer-motion": "Smooth entry animations and micro-interactions"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility for merging tailwind classes"

images:
  - path: "artifacts/casino-lobby/public/images/hero-bg.png"
    description: "Abstract luxury dark background with deep midnight navy, royal purple gradients, and neon cyan glowing geometric casino chip shapes, glassmorphism style, highly polished and premium"
